        }
    }
    
    // 计算MBTI结果 (根据各维度净得分)
    function computeMBTI() {
        let scores = {
            EI: 0,  // 正分倾向E，负分倾向I
            SN: 0,
            TF: 0,
            JP: 0
        };
        for (let i = 0; i < TOTAL_QS; i++) {
            const q = QUESTIONS[i];
            const ans = answers[i];
            if (ans !== null) {
                // ans 是用户选的倾向值: +1或-1, direction 是题目固有方向 (+1 选同意偏向E/S/T/J)
                // 用户选“同意”(即选择选项“是/同意”) => 得分 = direction值
                // 但是我们的选项设计: 选项1=“同意”(倾向方向), 选项2=“不同意”(反向)
                // 在渲染时我们把选项1分值设为 +direction, 选项2分值设为 -direction
                // 但存储的answers已经存储了得分值(+1或-1代表该题目贡献的维度方向)
                // 所以直接累加即可。
                scores[q.dimension] += ans;
            }
        }
        // 计算类型: 根据总分正负
        const getLetter = (dim, posLetter, negLetter) => {
            return scores[dim] >= 0 ? posLetter : negLetter;
        };
        const type = getLetter("EI", "E", "I") + getLetter("SN", "S", "N") + getLetter("TF", "T", "F") + getLetter("JP", "J", "P");

        const maxPossible = (dim) => {
            let cnt = QUESTIONS.filter(q => q.dimension === dim).length;
            return cnt;
        };
        const dimStrength = {
            EI: { score: scores.EI, max: maxPossible("EI"), left: "E", right: "I" },
            SN: { score: scores.SN, max: maxPossible("SN"), left: "S", right: "N" },
            TF: { score: scores.TF, max: maxPossible("TF"), left: "T", right: "F" },
            JP: { score: scores.JP, max: maxPossible("JP"), left: "J", right: "P" }
        };
        return { type, scores, dimStrength };
    }

            "INFJ": "提倡者｜理想主义，富有创造力和坚定信念。",
            "INFP": "调停者｜敏感理想主义，追求内在和谐与真实。",
            "ENFJ": "主人公｜热情利他，擅长启发他人。",
            "ENFP": "竞选者｜热情自由，富有感染力与创造力。",
            "ISTJ": "检查者｜务实负责，逻辑严谨，恪尽职守。",
            "ISFJ": "守护者｜善良奉献，默默支持他人。",
            "ESTJ": "监督者｜高效务实，擅长管理与执行。",
            "ESFJ": "执政官｜热心合作，注重传统与和谐。",
            "ISTP": "鉴赏家｜冷静理性，擅长解决实际问题。",
            "ISFP": "探险家｜艺术敏感，热爱自由与美感。",
            "ESTP": "企业家｜灵活现实，善于抓住机遇。",

        };
        return descriptions[mbtiType] || "独特且复杂的性格，融合多种特质，拥有无限潜力。";
    }
    
    // 渲染结果界面
    function renderResult() {
        const { type, scores, dimStrength } = computeMBTI();
        const desc = getTypeDescription(type);
        // 生成维度详情条
        const dims = [
            {name: "外向(E) —— 内向(I)", data: dimStrength.EI, leftCode: "E", rightCode: "I"},
            {name: "实感(S) —— 直觉(N)", data: dimStrength.SN, leftCode: "S", rightCode: "N"},
            {name: "思考(T) —— 情感(F)", data: dimStrength.TF, leftCode: "T", rightCode: "F"},
            {name: "判断(J) —— 感知(P)", data: dimStrength.JP, leftCode: "J", rightCode: "P"}
        ];
        const dimHtml = dims.map(d => {
            const scoreVal = d.data.score;
            const maxVal = d.data.max;
            // 计算倾向百分比: 若score为正，则左侧百分比 = (score/maxVal+1)/2? 更直观展示：分数从 -max 到 +max
            let leftPercent = 50;
            if (maxVal > 0) {
                let normalized = (scoreVal + maxVal) / (2 * maxVal) * 100;
                normalized = Math.min(100, Math.max(0, normalized));
                leftPercent = normalized;
            }
            const rightPercent = 100 - leftPercent;
            return `
                <div class="dimension-item">
                    <div>${d.leftCode} · ${d.rightCode}</div>
                    <div class="dimension-bar">
                        <div class="dimension-fill" style="width: ${leftPercent}%; background: #3b6e9e;"></div>
                    </div>
                    <div style="font-size:0.7rem; margin-top: 5px;">${scoreVal > 0 ? d.leftCode : d.rightCode}倾向 ${Math.abs(scoreVal)}/${maxVal}</div>
                </div>
            `;
        }).join('');
        
        const html = `
            <div class="result-card">
                <div class="result-type">${type}</div>
                <div class="result-title">✨ ${type} · ${desc.substring(0, 20)}</div>
                <div class="result-desc">${desc}</div>
                <div class="dimension-scores">
                    ${dimHtml}
                </div>
                <div class="result-desc" style="margin-top:0; font-size:0.9rem;">
                    💡 您的思维偏好组合为 ${type}，这反映了您在能量获取、信息处理、决策方式和生活态度上的独特风格。了解MBTI有助于职业规划与个人成长。
                </div>
                <button class="restart-btn" id="restartBtn">🔄 重新测评</button>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        document.getElementById("restartBtn")?.addEventListener("click", () => {
            resetTest();
        });
        updateProgress();
    }
    
    // 重置测评
    function resetTest() {
        currentIndex = 0;
        answers = new Array(TOTAL_QS).fill(null);
        showResult = false;
        renderCurrentQuestion();
        updateProgress();
    }
    
    // 渲染当前题目
    function renderCurrentQuestion() {
        if (showResult) return;
        if (currentIndex >= TOTAL_QS) {
            // 所有题目已答完，展示结果
            showResult = true;
            renderResult();
            return;
        }
        const q = QUESTIONS[currentIndex];
        const selectedVal = answers[currentIndex]; // 可能为null / +1 / -1
        // 构建选项：同意(倾向题目方向) / 不同意(反向)
        const agreeScore = q.direction;      // +1 or -1
        const disagreeScore = -q.direction;
        
        const isAgreeSelected = (selectedVal === agreeScore);
        const isDisagreeSelected = (selectedVal === disagreeScore);
        
        const html = `
            <div class="quiz-card">
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="options-list">
                    <div class="option-item" data-score="${agreeScore}">
                        <input type="radio" name="option" value="agree" id="opt_agree" class="option-radio" ${isAgreeSelected ? 'checked' : ''}>
                        <label for="opt_agree" class="option-label">✅ 同意 / 符合</label>
                    </div>
                    <div class="option-item" data-score="${disagreeScore}">
                        <input type="radio" name="option" value="disagree" id="opt_disagree" class="option-radio" ${isDisagreeSelected ? 'checked' : ''}>
                        <label for="opt_disagree" class="option-label">❌ 不同意 / 不符合</label>
                    </div>
                </div>
                <div class="nav-buttons">
                    <button class="secondary" id="prevBtn" ${currentIndex === 0 ? 'disabled style="opacity:0.5;"' : ''}>◀ 上一题</button>
                    <button class="primary" id="nextBtn">${currentIndex === TOTAL_QS-1 ? '完成测评 ✓' : '下一题 ▶'}</button>
                </div>
            </div>
        `;
        dynamicDiv.innerHTML = html;
        
        // 绑定选项点击事件 (整项点击)
        const options = document.querySelectorAll('.option-item');
        options.forEach(opt => {
            const radio = opt.querySelector('input');
            opt.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    radio.checked = true;
                }
                const score = parseInt(opt.dataset.score, 10);
                if (!isNaN(score)) {
                    answers[currentIndex] = score;
                    updateProgress();
                    // 重新高亮样式 (重新渲染当前题目避免复杂样式，但为了体验，直接更新存储并重新渲染简洁)
                    renderCurrentQuestion(); // 刷新显示选中状态
                }
            });
            radio.addEventListener('change', (e) => {
                if (radio.checked) {
                    const score = parseInt(opt.dataset.score, 10);
                    if (!isNaN(score)) {
                        answers[currentIndex] = score;
                        updateProgress();
                        renderCurrentQuestion();
                    }
                }
            });
        });
        
        // 按钮事件
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        if (prevBtn) prevBtn.onclick = () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderCurrentQuestion();
            }
        };
        if (nextBtn) nextBtn.onclick = () => {
            // 若当前未选择，提示但不跳转
            if (answers[currentIndex] === null) {
                alert("请先选择一个选项（同意/不同意）");
                return;
            }
            if (currentIndex + 1 <= TOTAL_QS) {
                currentIndex++;
                if (currentIndex === TOTAL_QS) {
                    // 全部做完，展示结果
                    showResult = true;
                    renderResult();
                } else {
                    renderCurrentQuestion();
                }
                updateProgress();
            }
        };
        updateProgress();
    }
    
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }
    
    // 启动
    function init() {
        showResult = false;
        currentIndex = 0;
        answers.fill(null);
        renderCurrentQuestion();
        updateProgress();
    }
    init();
</script>
</body>
</html>
